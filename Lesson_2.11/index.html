<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
.grid-container{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: repeat(5 , 1fr);
    justify-content: center;
    gap: 10px;

}
.box{
    background-color: blue;
    color: white;
    text-align: center;
    font-size: 50px;
}
.head{
    grid-column: 1 / 4;
}
.siderbar{
    grid-row: 2 / 6;
}
.content1{
    grid-row: 2 / 4;
    grid-column: 2 / 4;
}
.det{
    grid-column: 1 / 4;
}
.content2{
    grid-row: 4 / 6;
}
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="box head">1</div>
        <div class="box siderbar">2</div>
        <div class="box content1">3</div>
        <div class="box content2">4</div>
        <div class="box content2">5</div>
        <div class="box det">6</div>
    </div>
</body>
</html>
